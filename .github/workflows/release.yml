name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ always() && (startsWith(github.ref, 'refs/tags/v') || needs.release-please.outputs.release_created == 'true') }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-22.04
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || needs.release-please.outputs.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev patchelf libayatana-appindicator3-dev
      - name: Install npm dependencies
        run: npm ci
      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || needs.release-please.outputs.tag_name }}
          releaseName: Skill Nexus ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || needs.release-please.outputs.tag_name }}
          releaseDraft: false
          prerelease: ${{ contains((startsWith(github.ref, 'refs/tags/v') && github.ref_name || needs.release-please.outputs.tag_name), 'alpha') || contains((startsWith(github.ref, 'refs/tags/v') && github.ref_name || needs.release-please.outputs.tag_name), 'beta') || contains((startsWith(github.ref, 'refs/tags/v') && github.ref_name || needs.release-please.outputs.tag_name), 'rc') }}
