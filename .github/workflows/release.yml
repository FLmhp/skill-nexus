name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options: ['patch', 'minor', 'major']
        default: 'patch'

jobs:
  bump-version:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Get current version
        id: current_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "current=$VERSION" >> $GITHUB_OUTPUT
      - name: Calculate new version
        id: new_version
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.current_version.outputs.current }}"
          BUMP="${{ inputs.bump_type }}"
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          echo "version=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT
      - name: Bump version
        run: node scripts/bump-version.mjs ${{ steps.new_version.outputs.version }}
      - name: Push tag
        run: |
          git push origin main
          git push origin v${{ steps.new_version.outputs.version }}

  build:
    needs: bump-version
    if: always() && !failure() && !cancelled()
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-22.04
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev patchelf
      - name: Install npm dependencies
        run: npm ci
      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Skill Nexus v__VERSION__'
          releaseBody: |
            ## Skill Nexus v__VERSION__

            ### Downloads
            - **Windows**: Skill-Nexus__VERSION___x64-setup.exe
            - **macOS**: Skill-Nexus__VERSION___x64.dmg
            - **Linux**: Skill-Nexus__VERSION___amd64.deb / .AppImage

            See [CHANGELOG.md](https://github.com/FLmhp/skill-nexus/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
